<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Battle Strike</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            font-family: 'Rajdhani', sans-serif;
            touch-action: none;
            background: #000;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas { display: block; }

        /* ── SCANLINE OVERLAY ── */
        body::after {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px,
                transparent 3px,
                rgba(0,0,0,0.04) 3px,
                rgba(0,0,0,0.04) 4px
            );
            pointer-events: none;
            z-index: 200;
        }

        /* ── START SCREEN ── */
        #start-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #000 70%);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 150; text-align: center;
            overflow: hidden;
        }

        #start-screen::before {
            content: '';
            position: absolute; inset: 0;
            background:
                linear-gradient(45deg, transparent 48%, rgba(0,255,150,0.03) 50%, transparent 52%),
                linear-gradient(-45deg, transparent 48%, rgba(0,255,150,0.03) 50%, transparent 52%);
            background-size: 60px 60px;
            animation: gridMove 8s linear infinite;
        }

        @keyframes gridMove {
            from { background-position: 0 0; }
            to { background-position: 60px 60px; }
        }

        .start-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(32px, 8vw, 72px);
            font-weight: 900;
            letter-spacing: 6px;
            color: #fff;
            text-shadow:
                0 0 20px rgba(0,255,150,0.8),
                0 0 60px rgba(0,255,150,0.4),
                0 0 100px rgba(0,255,150,0.2);
            animation: logoFlicker 3s ease-in-out infinite;
            position: relative; z-index: 1;
        }

        @keyframes logoFlicker {
            0%,100% { opacity: 1; }
            92% { opacity: 1; }
            93% { opacity: 0.8; }
            94% { opacity: 1; }
            96% { opacity: 0.9; }
            97% { opacity: 1; }
        }

        .start-subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-size: clamp(14px, 3vw, 22px);
            color: rgba(0,255,150,0.7);
            letter-spacing: 8px;
            text-transform: uppercase;
            margin: 12px 0 40px;
            position: relative; z-index: 1;
        }

        .mission-brief {
            background: rgba(0,255,150,0.05);
            border: 1px solid rgba(0,255,150,0.2);
            border-radius: 4px;
            padding: 20px 40px;
            margin-bottom: 40px;
            position: relative; z-index: 1;
            backdrop-filter: blur(10px);
        }

        .mission-brief p {
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            letter-spacing: 2px;
        }

        .mission-brief .mission-title {
            color: #00ff96;
            font-size: 12px;
            letter-spacing: 4px;
            margin-bottom: 8px;
            opacity: 0.7;
        }

        .start-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 4px;
            padding: 18px 60px;
            background: transparent;
            color: #00ff96;
            border: 2px solid #00ff96;
            border-radius: 2px;
            cursor: pointer;
            position: relative; z-index: 1;
            text-transform: uppercase;
            clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0,255,150,0.3), inset 0 0 20px rgba(0,255,150,0.05);
        }

        .start-btn:hover, .start-btn:active {
            background: rgba(0,255,150,0.15);
            box-shadow: 0 0 40px rgba(0,255,150,0.5), inset 0 0 30px rgba(0,255,150,0.1);
            transform: scale(1.05);
        }

        .corner-deco {
            position: absolute;
            width: 60px; height: 60px;
            border-color: rgba(0,255,150,0.4);
            border-style: solid;
        }
        .corner-deco.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
        .corner-deco.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
        .corner-deco.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
        .corner-deco.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

        /* ── HUD ── */
        #hud {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 10;
        }

        /* Top Bar */
        .hud-top {
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 60px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), transparent);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .hud-kills {
            font-family: 'Orbitron', sans-serif;
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .hud-kills .kill-icon {
            width: 8px; height: 8px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 8px #ff4444;
        }

        .kill-num {
            color: #ff4444;
            text-shadow: 0 0 10px rgba(255,68,68,0.8);
        }

        .kill-total { color: rgba(255,255,255,0.4); }

        /* Kill indicators (small boxes) */
        .kill-pips {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .kill-pip {
            width: 12px;
            height: 16px;
            border: 1px solid rgba(255,255,255,0.25);
            border-radius: 2px;
            background: transparent;
            transition: all 0.3s ease;
        }

        .kill-pip.filled {
            background: #ff4444;
            border-color: #ff4444;
            box-shadow: 0 0 6px rgba(255,68,68,0.7);
        }

        .hud-ammo {
            font-family: 'Orbitron', sans-serif;
            font-size: 28px;
            font-weight: 700;
            color: #fff;
            text-align: right;
        }

        .hud-ammo .ammo-label {
            font-size: 10px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            display: block;
        }

        /* Health Bar - Bottom Left */
        .hud-health {
            position: absolute;
            bottom: 200px;
            left: 20px;
        }

        .health-label {
            font-size: 10px;
            letter-spacing: 3px;
            color: rgba(255,255,255,0.5);
            margin-bottom: 4px;
        }

        .health-bar-wrap {
            width: 160px;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 2px;
            overflow: visible;
            position: relative;
        }

        .health-bar-fill {
            height: 100%;
            background: linear-gradient(to right, #ff4444, #ff6666);
            border-radius: 2px;
            width: 100%;
            transition: width 0.3s ease;
            position: relative;
        }

        .health-bar-fill::after {
            content: '';
            position: absolute;
            right: 0; top: -2px;
            width: 3px; height: 12px;
            background: #fff;
            border-radius: 2px;
            box-shadow: 0 0 8px #ff4444;
        }

        .health-value {
            font-family: 'Orbitron', sans-serif;
            font-size: 14px;
            color: #ff4444;
            margin-top: 4px;
        }

        /* Crosshair */
        #crosshair {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 15;
        }

        .crosshair-ring {
            width: 40px; height: 40px;
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            position: relative;
            display: flex; align-items: center; justify-content: center;
        }

        .crosshair-dot {
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
        }

        .crosshair-line {
            position: absolute;
            background: rgba(255,255,255,0.5);
        }
        .crosshair-line.h { width: 10px; height: 1px; }
        .crosshair-line.v { width: 1px; height: 10px; }
        .crosshair-line.l { right: calc(100% + 4px); top: 50%; transform: translateY(-50%); }
        .crosshair-line.r { left: calc(100% + 4px); top: 50%; transform: translateY(-50%); }
        .crosshair-line.t { bottom: calc(100% + 4px); left: 50%; transform: translateX(-50%); }
        .crosshair-line.b { top: calc(100% + 4px); left: 50%; transform: translateX(-50%); }

        /* Hit flash */
        #hit-flash {
            position: fixed; inset: 0;
            background: rgba(255,0,0,0.25);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.05s;
        }

        #kill-flash {
            position: fixed; inset: 0;
            background: rgba(0,255,150,0.1);
            pointer-events: none;
            z-index: 50;
            opacity: 0;
            transition: opacity 0.05s;
        }

        /* ── MOBILE CONTROLS ── */
        #joystick-area {
            position: fixed;
            bottom: 50px; left: 40px;
            width: 120px; height: 120px;
            background: radial-gradient(circle, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 70%);
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            touch-action: none;
            z-index: 20;
        }

        #joystick-knob {
            position: absolute;
            top: 35px; left: 35px;
            width: 50px; height: 50px;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.15) 100%);
            border: 1.5px solid rgba(255,255,255,0.4);
            border-radius: 50%;
            pointer-events: none;
            transition: transform 0.05s;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }

        #fire-btn {
            position: fixed;
            bottom: 55px; right: 45px;
            width: 90px; height: 90px;
            background: radial-gradient(circle, rgba(255,50,50,0.6) 0%, rgba(180,20,20,0.7) 100%);
            border: 2px solid rgba(255,100,100,0.6);
            border-radius: 50%;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 20;
            touch-action: none;
            box-shadow:
                0 0 20px rgba(255,50,50,0.4),
                inset 0 1px 0 rgba(255,255,255,0.2);
            transition: all 0.1s ease;
        }

        #fire-btn:active {
            transform: scale(0.93);
            box-shadow: 0 0 35px rgba(255,50,50,0.7), inset 0 0 15px rgba(0,0,0,0.3);
        }

        .fire-icon {
            font-size: 22px;
            margin-bottom: 2px;
        }

        /* ── GAME OVER / WIN OVERLAY ── */
        #end-screen {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #0a0f1e 0%, #000 70%);
            display: none;
            flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 150; text-align: center;
        }

        #end-screen.show { display: flex; }

        .end-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(28px, 7vw, 60px);
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 16px;
        }

        .end-title.win { color: #00ff96; text-shadow: 0 0 30px rgba(0,255,150,0.8); }
        .end-title.lose { color: #ff4444; text-shadow: 0 0 30px rgba(255,68,68,0.8); }

        .end-sub {
            color: rgba(255,255,255,0.5);
            font-size: 16px;
            letter-spacing: 4px;
            margin-bottom: 50px;
        }

        /* ── KILL NOTIFICATION ── */
        #kill-notify {
            position: fixed;
            top: 80px; left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 16px;
            font-weight: 700;
            color: #ff4444;
            letter-spacing: 3px;
            padding: 8px 20px;
            background: rgba(255,0,0,0.1);
            border: 1px solid rgba(255,0,0,0.3);
            border-radius: 2px;
            z-index: 30;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        #kill-notify.show { opacity: 1; }

        /* ── COMPASS ── */
        .hud-compass {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            color: rgba(255,255,255,0.4);
            letter-spacing: 3px;
            display: flex;
            gap: 20px;
        }

        .compass-n { color: #ff4444; font-weight: 700; }

        /* Muzzle flash */
        #muzzle-flash {
            position: fixed; inset: 0;
            background: radial-gradient(circle at 50% 55%, rgba(255,200,50,0.15), transparent 40%);
            pointer-events: none;
            z-index: 40;
            opacity: 0;
        }
    </style>
</head>
<body>

<!-- Start Screen -->
<div id="start-screen">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>

    <div class="start-logo">BATTLE STRIKE</div>
    <div class="start-subtitle">Urban Warfare &#x2219; 3D</div>

    <div class="mission-brief">
        <div class="mission-title">&#x25B6; MISSION BRIEFING</div>
        <p>Eliminate all 10 enemy combatants</p>
        <p style="margin-top:6px; font-size:13px; color:rgba(255,255,255,0.4);">Use joystick to move &#x2022; Swipe right side to aim &#x2022; FIRE to shoot</p>
    </div>

    <button class="start-btn" onclick="startGame()">&#x25BA; START MISSION</button>
</div>

<!-- End Screen -->
<div id="end-screen">
    <div class="corner-deco tl"></div>
    <div class="corner-deco tr"></div>
    <div class="corner-deco bl"></div>
    <div class="corner-deco br"></div>
    <div id="end-title" class="end-title">VICTORY</div>
    <div id="end-sub" class="end-sub">MISSION ACCOMPLISHED</div>
    <button class="start-btn" onclick="location.reload()">&#x21BA; PLAY AGAIN</button>
</div>

<!-- HUD -->
<div id="hud">
    <div class="hud-top">
        <div class="hud-kills">
            <div class="kill-icon"></div>
            <span>KILLS &nbsp;<span class="kill-num" id="kill-count">0</span><span class="kill-total">/10</span></span>
        </div>
        <div class="kill-pips" id="kill-pips"></div>
        <div class="hud-ammo">
            <span class="ammo-label">AMMO</span>
            &#x221E;
        </div>
    </div>

    <div class="hud-compass">
        <span>W</span><span>NW</span><span class="compass-n">N</span><span>NE</span><span>E</span>
    </div>

    <div class="hud-health">
        <div class="health-label">SOLDIER HEALTH</div>
        <div class="health-bar-wrap">
            <div class="health-bar-fill" id="hp-fill"></div>
        </div>
        <div class="health-value" id="hp-val">100</div>
    </div>
</div>

<!-- Crosshair -->
<div id="crosshair">
    <div class="crosshair-ring">
        <div class="crosshair-line h l"></div>
        <div class="crosshair-line h r"></div>
        <div class="crosshair-line v t"></div>
        <div class="crosshair-line v b"></div>
        <div class="crosshair-dot"></div>
    </div>
</div>

<!-- Effects -->
<div id="hit-flash"></div>
<div id="kill-flash"></div>
<div id="muzzle-flash"></div>
<div id="kill-notify">ENEMY DOWN</div>

<!-- Mobile Controls -->
<div id="joystick-area"><div id="joystick-knob"></div></div>
<div id="fire-btn">
    <div class="fire-icon">&#x1F4A5;</div>
    FIRE
</div>

<script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

// ── INIT KILL PIPS ──
const pipsContainer = document.getElementById('kill-pips');
for (let i = 0; i < 10; i++) {
    const pip = document.createElement('div');
    pip.className = 'kill-pip';
    pip.id = `pip-${i}`;
    pipsContainer.appendChild(pip);
}

// ── STATE ──
let gameActive = false;
let kills = 0;
let playerHp = 100;
let enemies = [];
let lookDeltaX = 0, lookDeltaY = 0;
let moveX = 0, moveZ = 0;
let playerYaw = 0;
let playerPitch = 0;

// ── RENDERER ──
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// ── SCENE ──
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x8ab4cc);
scene.fog = new THREE.FogExp2(0x8ab4cc, 0.018);

// ── CAMERA ──
const camera = new THREE.PerspectiveCamera(72, window.innerWidth / window.innerHeight, 0.1, 300);
camera.position.set(0, 0, 0);

// Player pivot
const playerPivot = new THREE.Object3D();
playerPivot.position.set(0, 1.72, 0);
scene.add(playerPivot);
playerPivot.add(camera);

// ── LIGHTING ──
const ambientLight = new THREE.AmbientLight(0xb0c4de, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xfff5e0, 2.2);
sunLight.position.set(40, 80, 30);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 200;
sunLight.shadow.camera.left = -80;
sunLight.shadow.camera.right = 80;
sunLight.shadow.camera.top = 80;
sunLight.shadow.camera.bottom = -80;
sunLight.shadow.bias = -0.0005;
scene.add(sunLight);

const fillLight = new THREE.HemisphereLight(0x87ceeb, 0x4a3728, 0.5);
scene.add(fillLight);

// ── TEXTURES (procedural) ──
function makeGroundTexture() {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = '#5a5a5a';
    ctx.fillRect(0, 0, 512, 512);
    for (let i = 0; i < 4000; i++) {
        const x = Math.random() * 512;
        const y = Math.random() * 512;
        const v = Math.floor(Math.random() * 30);
        ctx.fillStyle = `rgb(${80+v},${80+v},${75+v})`;
        ctx.fillRect(x, y, 2, 2);
    }
    // Road markings
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 512; i += 32) {
        ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,512); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(512,i); ctx.stroke();
    }
    const tex = new THREE.CanvasTexture(c);
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(20, 20);
    return tex;
}

function makeBuildingTexture(color1, color2) {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 512;
    const ctx = c.getContext('2d');
    ctx.fillStyle = color1;
    ctx.fillRect(0, 0, 256, 512);
    // Windows
    for (let row = 0; row < 16; row++) {
        for (let col = 0; col < 4; col++) {
            const wx = 20 + col * 58;
            const wy = 20 + row * 30;
            const lit = Math.random() > 0.4;
            ctx.fillStyle = lit ? `rgba(255,240,150,0.85)` : `rgba(30,40,60,0.9)`;
            ctx.fillRect(wx, wy, 36, 20);
            ctx.strokeStyle = color2;
            ctx.lineWidth = 2;
            ctx.strokeRect(wx, wy, 36, 20);
        }
    }
    return new THREE.CanvasTexture(c);
}

// ── ENVIRONMENT ──
// Ground
const groundMat = new THREE.MeshStandardMaterial({
    map: makeGroundTexture(),
    roughness: 0.95, metalness: 0.0,
    color: 0x888888
});
const ground = new THREE.Mesh(new THREE.PlaneGeometry(300, 300), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// Sky gradient dome
const skyGeo = new THREE.SphereGeometry(250, 16, 8);
const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
        topColor: { value: new THREE.Color(0x2a6fa8) },
        bottomColor: { value: new THREE.Color(0x8ab4cc) },
        offset: { value: 20 }, exponent: { value: 0.5 }
    },
    vertexShader: `
        varying vec3 vWorldPos;
        void main() { vWorldPos = (modelMatrix * vec4(position,1.0)).xyz; gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0); }
    `,
    fragmentShader: `
        uniform vec3 topColor, bottomColor;
        uniform float offset, exponent;
        varying vec3 vWorldPos;
        void main() {
            float h = normalize(vWorldPos + vec3(0,offset,0)).y;
            gl_FragColor = vec4(mix(bottomColor, topColor, max(pow(max(h,0.0),exponent),0.0)),1.0);
        }
    `
});
scene.add(new THREE.Mesh(skyGeo, skyMat));

// Buildings
const buildingConfigs = [
    { color: '#6a7080', win: '#455060' },
    { color: '#7a6a60', win: '#554a42' },
    { color: '#607060', win: '#405040' },
    { color: '#706060', win: '#504040' },
];

const buildingPositions = [];
function placeBuilding(x, z, w, h, d) {
    const cfg = buildingConfigs[Math.floor(Math.random() * buildingConfigs.length)];
    const mat = new THREE.MeshStandardMaterial({
        map: makeBuildingTexture(cfg.color, cfg.win),
        roughness: 0.8, metalness: 0.1,
        color: 0xaaaaaa
    });
    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    mesh.position.set(x, h / 2, z);
    mesh.castShadow = true;
    mesh.receiveShadow = true;

// ── AUDIO ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playGunshot() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const bufSize = audioCtx.sampleRate * 0.15;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
        data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 3);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(1.2, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 800;
    src.connect(filter);
    filter.connect(gain);
    gain.connect(audioCtx.destination);
    src.start();
}

function playHitSound() {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(80, audioCtx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + 0.12);
}

// ── PARTICLE SYSTEM ──
const particles = [];
const particleMat = new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xff4400, emissiveIntensity: 2 });
function spawnBloodParticles(pos) {
    for (let i = 0; i < 8; i++) {
        const p = new THREE.Mesh(new THREE.SphereGeometry(0.04, 4, 4), new THREE.MeshStandardMaterial({ color: 0xcc0000, emissive: 0x440000 }));
        p.position.copy(pos);
        p.velocity = new THREE.Vector3((Math.random()-0.5)*0.3, Math.random()*0.2+0.1, (Math.random()-0.5)*0.3);
        p.life = 1.0;
        scene.add(p);
        particles.push(p);
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.life -= 0.04;
        p.velocity.y -= 0.01;
        p.position.addScaledVector(p.velocity, 1);
        p.material.opacity = p.life;
        p.material.transparent = true;
        if (p.life <= 0) { scene.remove(p); particles.splice(i, 1); }
    }
}

// ── ENEMY CLASS ──
class Enemy {
    constructor() {
        const isElite = Math.random() > 0.6;
        const uniformColor = isElite ? 0x1a2a1a : 0x3a3a2a;
        const helmetColor  = isElite ? 0x111111 : 0x2a2a1a;
        const skin = [0xf5c89a, 0xd4906a, 0xc07850][Math.floor(Math.random()*3)];

        const { group, leftThigh, leftShin, rightThigh, rightShin, leftUpperArm, rightUpperArm } = createHumanBody(skin, uniformColor, helmetColor, true);
        this.mesh = group;
        this.parts = { leftThigh, leftShin, rightThigh, rightShin, leftUpperArm, rightUpperArm };
        this.hp = isElite ? 3 : 2;
        this.speed = isElite ? 0.04 : 0.03;
        this.lastShotTime = 0;
        this.walkCycle = Math.random() * Math.PI * 2;
        this.isElite = isElite;
        this.spawn();
        scene.add(this.mesh);
    }

    spawn() {
        let x, z;
        do {
            x = (Math.random() - 0.5) * 80;
            z = (Math.random() - 0.5) * 80;
        } while (Math.sqrt(x*x + z*z) < 15);
        this.mesh.position.set(x, 0, z);
    }

    update(dt) {
        const px = playerPivot.position.x;
        const pz = playerPivot.position.z;
        const dist = this.mesh.position.distanceTo(new THREE.Vector3(px, 0, pz));

        this.mesh.lookAt(px, 0, pz);

        if (dist > 5) {
            this.walkCycle += 0.12;
            this.mesh.translateZ(this.speed);

            // Walk animation – limb swing
            const swing = Math.sin(this.walkCycle) * 0.5;
            if (this.parts.leftThigh)  this.parts.leftThigh.rotation.x  =  swing;
            if (this.parts.rightThigh) this.parts.rightThigh.rotation.x = -swing;
            if (this.parts.leftShin)   this.parts.leftShin.rotation.x   =  Math.max(0, swing) * 0.6;
            if (this.parts.rightShin)  this.parts.rightShin.rotation.x  =  Math.max(0, -swing) * 0.6;
            if (this.parts.leftUpperArm)  this.parts.leftUpperArm.rotation.z  = 0.25 + swing * 0.3;
            if (this.parts.rightUpperArm) this.parts.rightUpperArm.rotation.z = -0.25 - swing * 0.3;

            // Bobbing
            this.mesh.position.y = Math.abs(Math.sin(this.walkCycle)) * 0.06;
        } else {
            // Combat
            if (Date.now() - this.lastShotTime > 1600) {
                playerHp -= this.isElite ? 15 : 10;
                playerHp = Math.max(0, playerHp);
                playHitSound();
                flashEffect('hit-flash');
                updateUI();
                this.lastShotTime = Date.now();
            }
        }
    }

    takeDamage() {
        this.hp--;
        spawnBloodParticles(this.mesh.position.clone().setY(1));
        if (this.hp <= 0) return true;
        // Flash red
        this.mesh.traverse(c => {
            if (c.isMesh) {
                const orig = c.material.color.clone();
                c.material.emissive.set(0xff0000);
                c.material.emissiveIntensity = 0.5;
                setTimeout(() => { c.material.emissive.set(0x000000); c.material.emissiveIntensity = 0; }, 120);
            }
        });
        return false;
    }
}

// ── UI EFFECTS ──
function flashEffect(id, duration = 150) {
    const el = document.getElementById(id);
    el.style.opacity = '1';
    setTimeout(() => { el.style.opacity = '0'; }, duration);
}

function showKillNotify() {
    const el = document.getElementById('kill-notify');
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1000);
}

// ── GAME LOGIC ──
window.startGame = function() {
    document.getElementById('start-screen').style.display = 'none';
    resetGame();
    gameActive = true;
};

function resetGame() {
    playerHp = 100;
    kills = 0;
    playerPivot.position.set(0, 1.72, 0);
    playerYaw = 0; playerPitch = 0;
    enemies.forEach(e => scene.remove(e.mesh));
    enemies = [];
    for (let i = 0; i < 10; i++) enemies.push(new Enemy());
    updateUI();
}

function updateUI() {
    document.getElementById('kill-count').innerText = kills;
    document.getElementById('hp-fill').style.width = playerHp + '%';
    document.getElementById('hp-val').innerText = playerHp;

    // Update pips
    for (let i = 0; i < 10; i++) {
        const pip = document.getElementById(`pip-${i}`);
        if (pip) pip.classList.toggle('filled', i < kills);
    }

    if (playerHp <= 0) {
        gameActive = false;
        setTimeout(() => {
            document.getElementById('end-title').className = 'end-title lose';
            document.getElementById('end-title').textContent = 'ELIMINATED';
            document.getElementById('end-sub').textContent = 'MISSION FAILED — ' + kills + ' KILLS';
            document.getElementById('end-screen').classList.add('show');
        }, 500);
    }
    if (kills >= 10) {
        gameActive = false;
        setTimeout(() => {
            document.getElementById('end-title').className = 'end-title win';
            document.getElementById('end-title').textContent = 'VICTORY';
            document.getElementById('end-sub').textContent = 'ALL ENEMIES ELIMINATED';
            document.getElementById('end-screen').classList.add('show');
        }, 500);
    }
}

// ── CONTROLS ──
const knob = document.getElementById('joystick-knob');
let joystickActive = false;

document.getElementById('joystick-area').addEventListener('touchstart', e => {
    joystickActive = true; e.preventDefault();
}, { passive: false });

document.getElementById('joystick-area').addEventListener('touchmove', e => {
    e.preventDefault();
    const touch = e.touches[0];
    const rect = e.currentTarget.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    let dx = touch.clientX - cx;
    let dy = touch.clientY - cy;
    const maxR = 44;
    const dist = Math.min(Math.sqrt(dx*dx + dy*dy), maxR);
    const angle = Math.atan2(dy, dx);
    moveX = (Math.cos(angle) * dist) / maxR;
    moveZ = (Math.sin(angle) * dist) / maxR;
    knob.style.transform = `translate(${moveX * maxR}px, ${moveZ * maxR}px)`;
}, { passive: false });

document.getElementById('joystick-area').addEventListener('touchend', e => {
    moveX = 0; moveZ = 0; joystickActive = false;
    knob.style.transform = 'translate(0,0)';
});

// Look controls (right side of screen)
let lookTouchId = null, lastX = 0, lastY = 0;
window.addEventListener('touchstart', e => {
    for (const t of e.changedTouches) {
        if (t.clientX > window.innerWidth * 0.35 && lookTouchId === null) {
            // Not on joystick or fire
            const fireRect = document.getElementById('fire-btn').getBoundingClientRect();
            const inFire = t.clientX >= fireRect.left && t.clientX <= fireRect.right &&
                           t.clientY >= fireRect.top && t.clientY <= fireRect.bottom;
            if (!inFire) {
                lookTouchId = t.identifier;
                lastX = t.clientX; lastY = t.clientY;
            }
        }
    }
});

window.addEventListener('touchmove', e => {
    for (const t of e.changedTouches) {
        if (t.identifier === lookTouchId) {
            lookDeltaX += (t.clientX - lastX) * 0.006;
            lookDeltaY += (t.clientY - lastY) * 0.005;
            lastX = t.clientX; lastY = t.clientY;
        }
    }
}, { passive: false });

window.addEventListener('touchend', e => {
    for (const t of e.changedTouches) {
        if (t.identifier === lookTouchId) lookTouchId = null;
    }
});

// Mouse support (desktop)
let mouseLocked = false;
renderer.domElement.addEventListener('click', () => {
    renderer.domElement.requestPointerLock && renderer.domElement.requestPointerLock();
});
document.addEventListener('pointerlockchange', () => {
    mouseLocked = !!document.pointerLockElement;
});
document.addEventListener('mousemove', e => {
    if (!mouseLocked || !gameActive) return;
    lookDeltaX += e.movementX * 0.003;
    lookDeltaY += e.movementY * 0.002;
});

// Keyboard support
const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── FIRE BUTTON ──
const raycaster = new THREE.Raycaster();
function shoot() {
    if (!gameActive) return;
    playGunshot();
    flashEffect('muzzle-flash', 80);

    raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
    const meshList = enemies.map(e => e.mesh);
    const hits = raycaster.intersectObjects(meshList, true);

    if (hits.length > 0) {
        let obj = hits[0].object;
        while (obj.parent && !enemies.find(e => e.mesh === obj)) obj = obj.parent;
        const idx = enemies.findIndex(e => e.mesh === obj);
        if (idx > -1) {
            const dead = enemies[idx].takeDamage();
            if (dead) {
                scene.remove(enemies[idx].mesh);
                enemies.splice(idx, 1);
                kills++;
                flashEffect('kill-flash', 200);
                showKillNotify();
                updateUI();
            }
        }
    }
}

document.getElementById('fire-btn').addEventListener('touchstart', e => {
    e.preventDefault(); shoot();
}, { passive: false });

document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'KeyF') shoot();
    if (e.code === 'KeyR') resetGame();
});

// ── ANIMATION LOOP ──
const clock = new THREE.Clock();
const tempVec = new THREE.Vector3();
const moveDir = new THREE.Vector3();

function animate() {
    requestAnimationFrame(animate);
    const dt = clock.getDelta();

    if (!gameActive) {
        renderer.render(scene, camera); return;
    }

    // Camera rotation
    playerYaw   -= lookDeltaX;
    playerPitch -= lookDeltaY;
    playerPitch = Math.max(-1.1, Math.min(1.1, playerPitch));
    lookDeltaX *= 0.7; lookDeltaY *= 0.7;

    playerPivot.rotation.y = playerYaw;
    camera.rotation.x = playerPitch;

    // Keyboard movement
    if (keys['KeyW'] || keys['ArrowUp'])    moveZ = -1;
    else if (keys['KeyS'] || keys['ArrowDown'])  moveZ =  1;
    else if (!joystickActive) moveZ = 0;
    if (keys['KeyA'] || keys['ArrowLeft'])  moveX = -1;
    else if (keys['KeyD'] || keys['ArrowRight']) moveX =  1;
    else if (!joystickActive) moveX = 0;

    // Move
    const spd = 0.08;
    moveDir.set(moveX, 0, moveZ).normalize();
    playerPivot.translateX(moveDir.x * spd);
    playerPivot.translateZ(moveDir.z * spd);

    // Clamp player to map
    playerPivot.position.x = Math.max(-120, Math.min(120, playerPivot.position.x));
    playerPivot.position.z = Math.max(-120, Math.min(120, playerPivot.position.z));

    // Enemies
    enemies.forEach(e => e.update(dt));

    // Particles
    updateParticles();

    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
