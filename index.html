<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG MAX PRO ENGINE</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#ui {
    position:fixed;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
}
#menu {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    color:white;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}
button { padding:10px 20px; }
</style>
</head>

<body>

<div id="menu">
<h1>🔥 PUBG MAX PRO</h1>
<button onclick="start()">START MATCH</button>
</div>

<div id="ui">
HP: <span id="hp">100</span> |
PLAYERS: <span id="players">0</span> |
ZONE: <span id="zone">0</span>
</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js";

/* CORE */
let scene, camera, renderer;
let socket, myId;

/* PLAYER */
const player = new THREE.Object3D();
let yaw = 0;
let hp = 100;

/* GAME DATA */
let players = {};
let bullets = {};
let zone = { radius:150 };

/* INPUT */
let keys = {};

/* INIT */
init();
animate();

function init(){

    scene = new THREE.Scene();

    camera = new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
    camera.position.y = 1.6;

    renderer = new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(innerWidth,innerHeight);
    document.body.appendChild(renderer.domElement);

    player.add(camera);
    scene.add(player);

    scene.add(new THREE.HemisphereLight(0xffffff,0x444444));

    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(600,600),
        new THREE.MeshBasicMaterial({color:0x1a1a1a})
    );
    ground.rotation.x = -Math.PI/2;
    scene.add(ground);

    document.addEventListener("keydown",e=>keys[e.code]=true);
    document.addEventListener("keyup",e=>keys[e.code]=false);

    document.addEventListener("mousemove",(e)=>{
        if(document.pointerLockElement!==document.body) return;
        yaw -= e.movementX*0.002;
        player.rotation.y = yaw;
    });

    document.body.addEventListener("click",()=>{
        document.body.requestPointerLock();
    });
}

/* CONNECT */
function connect(){
    socket = new WebSocket("ws://localhost:3000");

    socket.onmessage=(msg)=>{
        let data = JSON.parse(msg.data);

        if(data.type==="init"){
            myId = data.id;
            players = data.players;
            zone = data.zone;
        }

        if(data.type==="state"){
            players = data.players;
            bullets = data.bullets;
            zone = data.zone;
        }
    };
}

/* MOVE */
function update(){

    let speed = 0.25;
    let forward = new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));

    if(keys["KeyW"]) player.position.addScaledVector(forward,speed);
    if(keys["KeyS"]) player.position.addScaledVector(forward,-speed);

    if(socket){
        socket.send(JSON.stringify({
            type:"move",
            state:{
                x:player.position.x,
                y:player.position.y,
                z:player.position.z,
                yaw
            }
        }));
    }
}

/* SHOOT */
document.addEventListener("mousedown",()=>{
    if(socket){
        socket.send(JSON.stringify({
            type:"shoot",
            bullet:{
                x:player.position.x,
                z:player.position.z,
                dir:yaw
            }
        }));
    }
});

/* RENDER PLAYERS */
let meshes = {};

function renderPlayers(){

    Object.keys(players).forEach(id=>{

        if(!meshes[id]){
            let m = new THREE.Mesh(
                new THREE.BoxGeometry(1,2,1),
                new THREE.MeshBasicMaterial({color:"blue"})
            );
            scene.add(m);
            meshes[id]=m;
        }

        meshes[id].position.set(
            players[id].x,
            players[id].y,
            players[id].z
        );
    });

    document.getElementById("players").innerText =
        Object.keys(players).length;
}

/* ZONE RENDER */
let zoneMesh;

function renderZone(){

    if(!zoneMesh){
        zoneMesh = new THREE.Mesh(
            new THREE.RingGeometry(zone.radius-2, zone.radius, 64),
            new THREE.MeshBasicMaterial({color:"blue",side:THREE.DoubleSide})
        );
        zoneMesh.rotation.x = -Math.PI/2;
        scene.add(zoneMesh);
    }

    zoneMesh.scale.set(zone.radius/150,zone.radius/150,1);

    document.getElementById("zone").innerText =
        zone.radius.toFixed(1);
}

/* LOOP */
function animate(){
    requestAnimationFrame(animate);

    if(socket){
        update();
        renderPlayers();
        renderZone();
    }

    renderer.render(scene,camera);
}

/* START */
window.start = function(){
    document.getElementById("menu").style.display="none";
    connect();
};
</script>

</body>
</html>
